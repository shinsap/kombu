name: Keep Streamlit Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0,6,12,18 * * *"

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: https://ghx5efvjwmsvzpvjm6frwg.streamlit.app/
        run: |
          echo "Pinging: ${APP_URL}"
          curl --silent --max-time 30 --max-redirs 0 \
            --user-agent "github-actions-streamlit-keepawake" \
            "${APP_URL}" > /dev/null 2>&1 || true
          echo "Ping sent."
