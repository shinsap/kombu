name: Keep Streamlit Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0,6,12,18 * * *"

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: https://ghx5efvjwmsvzpvjm6frwg.streamlit.app/
        run: |
          set -euo pipefail

          echo "Pinging: ${APP_URL}"

          HTTP_CODE=$(curl \
            --silent \
            --show-error \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --write-out "%{http_code}" \
            --user-agent "github-actions-streamlit-keepawake" \
            "${APP_URL}" > /dev/null)

          echo "HTTP status: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 500 ]; then
            echo "Unexpected status: ${HTTP_CODE}"
            exit 1
          fi

          echo "Ping succeeded."
