name: Keep Streamlit Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0,6,12,18 * * *"

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          APP_URL: https://ghx5efvjwmsvzpvjm6frwg.streamlit.app/
        run: |
          echo "Pinging: ${APP_URL}"
          python3 - <<'EOF'
import urllib.request
import os
url = os.environ["APP_URL"]
try:
    req = urllib.request.Request(url, headers={"User-Agent": "github-actions-streamlit-keepawake"})
    urllib.request.urlopen(req, timeout=30)
except Exception as e:
    print(f"Note: {e}")
print("Ping sent.")
EOF
